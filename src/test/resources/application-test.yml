logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.stat: DEBUG
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: DEBUG                            # log SQL queries
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG
  file:
    name: logs/finbank-rule-engine.log                  # write to file
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    logback:
      rollingpolicy:
        max-file-size: 10MB                               # rotate after 10MB
        max-history: 30                                   # keep 30 days of logs
        file-name-pattern: logs/finbank-rule-engine-%d{yyyy-MM-dd}.%i.log

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    #    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        generate_statistics: true

  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false

  flyway:
    fail-on-unsupported-database: false

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000


server:
  servlet:
    context-path: /loan-processing
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: Strict

management:
  endpoints:
    web:
      base-path: /actuator          # explicitly set base path
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}





