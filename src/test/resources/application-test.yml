spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    #    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false

  flyway:
    fail-on-unsupported-database: false
    enabled: false

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000


server:
  servlet:
    context-path: /loan-processing
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: Strict





