spring:
  application:
    name: loan-rule-engine
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        generate_statistics: true

  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: true

  flyway:
    fail-on-unsupported-database: false
    enabled : true

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000


server:
  port: 8080
  servlet:
    context-path: /loan-rule-engine
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: Strict

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus, metrics, mappings
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        loan.application.evaluation.duration: true
        rule.evaluation.duration: true
        dsl.parse.duration: true
    tags:
      application: ${spring.application.name}

