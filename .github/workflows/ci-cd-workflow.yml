name: Spring Boot CI-CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      DB_TEST_URL: ${{ secrets.DB_TEST_URL }}
      DB_TEST_USERNAME: ${{ secrets.DB_TEST_USERNAME }}
      DB_TEST_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_USER: ${{ secrets.EC2_USER }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD}}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Tests
        run: mvn clean test

#      - name: Build Docker Image
#        run: docker build -t loan-rule-engine:${{ github.sha }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/loan-rule-engine:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/loan-rule-engine:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/loan-rule-engine:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/loan-rule-engine:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/loan-rule-engine
            git pull
            docker compose down --remove-orphans
            docker-compose pull
            docker-compose up -d