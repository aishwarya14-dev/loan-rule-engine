
services:

  app:
    image: aishwaryamehrotra/loan-rule-engine:latest
    container_name: loan-rule-engine
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:8080"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/loan-rule-engine/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
     - monitoring

  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data: