global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'loan-rule-engine'
    metrics_path: '/loan-rule-engine/actuator/prometheus'

    static_configs:
      - targets:
          - loan-rule-engine:8080

        labels:
          app: 'loan-rule-engine'

  - job_name: 'prometheus'

    static_configs:
      - targets:
          - localhost:9090